# Note: Services use Google Distroless base images for security
# Distroless images don't include shell/wget/curl, so health checks are simplified
# For production (Kubernetes), use HTTP-based liveness/readiness probes on /actuator/health

services:
  # User Service
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "9081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8081
    restart: on-failure
    networks:
      - ecommerce-network

  # Inventory Service
  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "9082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8082
    restart: on-failure
    networks:
      - ecommerce-network

  # Payment Service
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "9083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8083
    restart: on-failure
    networks:
      - ecommerce-network

  # Order Service (orchestrator - depends on other services)
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "9080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      - services.user-service.url=http://user-service:8081
      - services.inventory-service.url=http://inventory-service:8082
      - services.payment-service.url=http://payment-service:8083
    depends_on:
      - user-service
      - inventory-service
      - payment-service
    restart: on-failure
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge
